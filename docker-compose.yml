version: "3.9"

services:

  backend:
    build: ./backend
    container_name: sales-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - API_KEY=${API_KEY}
      - ALLOWED_ORIGINS=http://localhost:3000
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
        - VITE_API_KEY=${API_KEY}
    container_name: sales-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped